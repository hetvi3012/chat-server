spring.application.name=chat-server
# Database Connection (Using your local Postgres)
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=301204

# Hibernate / JPA Settings
# 'update' tells Hibernate to automatically create the SQL tables based on our Kotlin code
spring.jpa.hibernate.ddl-auto=update

# Show the raw SQL in the console so we can see what Hibernate is doing under the hood
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
grpc.server.port=9090
grpc.server.reflection-service-enabled=true